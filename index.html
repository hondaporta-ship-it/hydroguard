<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#F5F2EA" />

  <title>HydroGuard · ATS</title>
  <meta name="description" content="ATS 屋外警備の熱中症予防アプリ — HydroGuard" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="HydroGuard" />
  <meta name="format-detection" content="telephone=no" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://api.open-meteo.com" />

  <style>
    html, body { margin: 0; padding: 0; background: #F5F2EA; color: #1F3A52; min-height: 100vh; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
    #root { min-height: 100vh; }
    * { -webkit-touch-callout: none; box-sizing: border-box; }
    .loading {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px; font-family: 'JetBrains Mono', ui-monospace, monospace;
      color: #2E8BC0; font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
    }
    .loading-bar {
      width: 80px; height: 2px; background: rgba(46,139,192,0.2); border-radius: 1px; overflow: hidden;
    }
    .loading-bar::after {
      content: ''; display: block; width: 30%; height: 100%; background: #2E8BC0;
      animation: loading 1.2s infinite ease-in-out;
    }
    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">
      <div>HYDROGUARD</div>
      <div class="loading-bar"></div>
      <div style="opacity:0.5">起動中...</div>
    </div>
  </div>

  <script src="./bundle.js" defer></script>
</body>
</html>
